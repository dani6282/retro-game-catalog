server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    application/javascript
    application/json
    text/css
    text/javascript
    text/plain;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
